services:
  nginx:
    restart: unless-stopped
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  app:
    restart: unless-stopped
    build: .
    environment:
      - REDIS_URL=redis://redis:6379
      - RATE_LIMIT=120
    depends_on:
      - redis

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data:
