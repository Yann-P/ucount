name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv sync --all-extras
      - run: uv run ruff check backend
      - run: uv run pyright backend
      - run: cd backend && uv run pytest -v
